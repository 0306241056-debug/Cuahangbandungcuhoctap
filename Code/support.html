<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hỗ trợ • PayToWin</title>
    <link rel="stylesheet" href="./styles.css?v=1" />
  </head>
  <body>
    <div class="header">
      <div class="container header-inner">
        <a class="brand" href="index.html"
          ><span class="brand-badge">P</span><span>PayToWin</span></a
        >
        <div class="search"><input placeholder="Tìm kiếm…" /></div>
        <div class="nav">
          <a href="index.html">Trang chủ</a><a href="products.html">Sản phẩm</a
          ><a href="support.html" style="color: #3b82f6">Hỗ trợ</a
          ><a href="login.html">Đăng nhập</a>
        </div>
        <a class="cta-cart" href="cart.html">Giỏ hàng</a>
      </div>
    </div>

    <main class="container">
      <section class="section">
        <h2>Hỗ trợ khách hàng</h2>
        <div
          style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 18px"
        >
          <div class="card">
            <form class="form">
              <div>
                <label>Họ tên</label
                ><input class="input" placeholder="Tên của bạn" />
              </div>
              <div>
                <label>Email</label
                ><input
                  class="input"
                  type="email"
                  placeholder="ban@example.com"
                />
              </div>
              <div>
                <label>Nội dung</label
                ><textarea
                  class="input"
                  rows="5"
                  placeholder="Mô tả vấn đề..."
                ></textarea>
              </div>
              <a class="add-btn" href="#">Gửi</a>
            </form>
          </div>
          <div class="card">
            <h3>Câu hỏi thường gặp</h3>
            <p>
              <strong>Thời gian giao hàng?</strong><br />Nội thành 2–6 giờ, tỉnh
              1–3 ngày.
            </p>
            <p><strong>Đổi trả?</strong><br />Trong 7 ngày nếu sản phẩm lỗi.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="container cols">…</div></footer>
  </body>
</html>
